{{- $current := .RelPermalink -}}
<header class="nav page" role="banner">
  <a class="brand" href="{{ "/" | relURL }}" aria-label="{{ .Site.Title }} — home">
    <img class="logo" src="{{ "images/thumbs/iotone_logo_v1d250x250.png" | absURL }}" alt="IoTone, Inc.">
    {{ .Site.Params.brand_text | default "IoTone" }}
  </a>
  <nav class="links" role="navigation" aria-label="Primary">
    {{ range .Site.Menus.main }}
      {{ $active := or (eq $current .URL) (and (ne .URL "/") (hasPrefix $current .URL)) }}
      <a href="{{ .URL | relURL }}"{{ if $active }} class="active"{{ end }}>{{ .Name }}</a>
    {{ end }}
  </nav>
  {{ with .Site.Params.github_url }}<a class="cta" href="{{ . }}" rel="noopener">GitHub</a>{{ end }}
</header>
